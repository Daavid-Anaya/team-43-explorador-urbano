schema: spec-driven

context: |
  Project: team-43-explorador-urbano
  Stack: Vite 8 + React 19 + TypeScript 6 (npm)
  Architecture: frontend-only app shell in src/app with SDD/OpenSpec-first workflow
  Testing: Vitest 4 + React Testing Library + jsdom; strict TDD enabled
  Quality: oxlint, tsc -b, GitHub Actions CI on Node 22
  Collaboration: GitHub Flow, Conventional Commits, ~400 line review budget
  Persistence: hybrid (OpenSpec + Engram)
  Platform decision: Supabase + Vercel supersedes the previous AWS/Amplify plan; implementation must keep progress/rewards server/DB-derived and keep Supabase service role out of client code.

strict_tdd: true

testing:
  strict_tdd: true
  detected: 2026-07-23
  runner:
    framework: vitest
    command: npm run test
  layers:
    unit:
      available: true
      tool: Vitest
    integration:
      available: true
      tool: React Testing Library + jsdom
    e2e:
      available: false
      tool: "—"
  coverage:
    available: false
    command: "—"
  quality:
    linter:
      available: true
      command: npm run lint
    type_checker:
      available: true
      command: npm run typecheck
    formatter:
      available: false
      command: "—"

rules:
  proposal:
    - Write artifacts in English.
    - State impact on parallel work across 3 developers.
    - Include rollback plan for risky changes.
  specs:
    - Write artifacts in English.
    - Use Given/When/Then for scenarios.
    - Use RFC 2119 keywords (MUST, SHOULD, MAY).
  design:
    - Write artifacts in English.
    - Document architecture decisions and team ownership boundaries.
  tasks:
    - Write artifacts in English.
    - Group work for delegation across 3 developers.
    - Keep tasks independently reviewable within ~400 changed lines when possible.
  apply:
    guidelines:
      - Implementation is opt-in later; default workflow stops at task delegation.
      - Follow existing project patterns once source code exists.
    tdd: true
    test_command: npm run test
  verify:
    test_command: npm run test
    build_command: npm run build
    coverage_threshold: 0
  archive:
    - Preserve completed change history in openspec/changes/archive.

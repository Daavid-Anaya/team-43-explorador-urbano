name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local
        run: supabase start

      - name: Run Supabase security tests
        run: |
          echo "Running security tests..."
          supabase db reset --db-url $(supabase status -o env | grep DATABASE_URL | cut -d'=' -f2-)
          psql $(supabase status -o env | grep DATABASE_URL | cut -d'=' -f2-) -f supabase/tests/security.test.sql

      - name: Stop Supabase
        if: always()
        run: supabase stop
